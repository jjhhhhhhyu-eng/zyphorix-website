<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* دوائر خلفية متحركة */
.circle {
    position: absolute;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    animation: rotate 30s linear infinite;
}

.circle:nth-child(1) {
    width: 400px;
    height: 400px;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
}

.circle:nth-child(2) {
    width: 600px;
    height: 600px;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    animation-duration: 50s;
}

@keyframes rotate {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
}
