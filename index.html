<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphorix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.box {
    animation: fade 1.2s ease-in-out;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
    margin-bottom: 25px;
}

.btn {
    padding: 15px 35px;
    background: #5865F2;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: #4752c4;
}
</style>
</head>

<body>

<div class="box">
    <h1>Zyphorix</h1>
    <p>هذا هو الموقع الرسمي للبوت</p>
    <a href="https://discord.com/oauth2/authorize?client_id=1478319998614376582 "class="btn">

</body>
</html>
