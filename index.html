<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphorix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f3ec7, #1a5fff);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* انميشن الدخول */
.fade-in {
    animation: fadeIn 1.5s ease forwards;
    opacity: 0;
}

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

.container {
    padding: 60px 20px;
    transform: translateY(20px);
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

.button {
    margin-top: 25px;
    padding: 15px 30px;
    background: #5865F2;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.05);
}

/* قسم الاوامر */
.commands {
    background: rgba(0,0,0,0.2);
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
}

.command {
    background: rgba(255,255,255,0.1);
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container fade-in">
    <h1>سيرفر Zyphorix</h1>
    <p>هذا موقعنا الرسمي</p>

    <a href="PUT_YOUR_BOT_LINK_HERE" target="_blank">
        <button class="button">أضف البوت إلى سيرفرك</button>
    </a>
</div>

<div class="commands fade-in" style="animation-delay: 0.5s;">
    <h2>أوامر البوت</h2>

    <div class="command">/say — يكرر الكلام</div>
    <div class="command">/ban — حظر عضو</div>
    <div class="command">/ban remove — فك الحظر</div>
    <div class="command">/ban temp — حظر مؤقت</div>

</div>

</body>
  </html>
